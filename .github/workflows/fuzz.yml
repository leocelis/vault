name: Fuzz

# Smoke-fuzzes the untrusted-input parsers on every PR that touches them, so a hostile or
# corrupt vault file can never panic/over-allocate on open (constraint C30).
# Long-running fuzzing is delegated to OSS-Fuzz once enrolled.

on:
  pull_request:
    paths:
      - "crates/vault-core/src/format/**"
      - "crates/vault-core/src/envelope/**"
      - "crates/vault-core/src/crypto/**"
      - "crates/vault-core/src/vault.rs"
      - "fuzz/**"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [header_parse, stanza_parse, block_stream, payload_parse, vault_open]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Deliberate exemption from the rust-toolchain.toml pin: cargo-fuzz requires nightly.
      # The shipped binary is never built here (C34 reproducibility is unaffected).
      # NOTE: the toolchain FILE outranks the rustup default this action sets, so every cargo
      # invocation below must say `+nightly` explicitly — plain `cargo` would resolve to the
      # pinned 1.96 inside the repo (and cargo-fuzz needs nightly regardless).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (toolchain selected via input)
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      - name: Smoke-run ${{ matrix.target }} (60s)
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=60
