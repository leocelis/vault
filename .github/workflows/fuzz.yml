name: Fuzz

# Smoke-fuzzes the untrusted-input parsers on every PR that touches them, so a hostile or
# corrupt vault file can never panic/over-allocate on open (constraint C30).
# Long-running fuzzing is delegated to OSS-Fuzz once enrolled.

on:
  pull_request:
    paths:
      - "crates/vault-core/src/format/**"
      - "fuzz/**"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [header_parse, stanza_parse, block_stream]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Deliberate exemption from the rust-toolchain.toml pin: cargo-fuzz requires nightly.
      # The shipped binary is never built here (C34 reproducibility is unaffected).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (toolchain selected via input)
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Smoke-run ${{ matrix.target }} (60s)
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=60
        continue-on-error: true   # remove once fuzz targets are implemented (M2)
