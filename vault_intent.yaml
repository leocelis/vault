implementation_notes:
  segmentation_plan: |
    IVD Rule 1 — HIGH constraint density (34 constraints) requires segmented
    implementation. Implement one segment, re-read its constraints from disk,
    verify they all pass, then proceed to the next segment. Never implement
    across segments without verifying the preceding segment first.

    SEGMENT 1 — Cryptographic core (G1 + G2)
      Implement and verify: C1, C2, C3, C4, C5, C6
      Re-read C1–C6 from disk before each sub-segment.

    SEGMENT 2 — File format (G3) + parser robustness (G11 input half)
      Implement and verify: C7, C8, C9, C10, C30
      Re-read C7–C10, C30 from disk before each sub-segment.

    SEGMENT 3 — Memory hardening (G4)
      Implement and verify: C11, C12, C13, C25, C33
      Re-read C11–C13, C25, C33 from disk before each sub-segment.

    SEGMENT 4 — Hardware factors (G5) + Rollback & save safety (G6)
      Implement and verify: C14, C15, C16, C17, C32
      Re-read C14–C17, C32 from disk before each sub-segment.

    SEGMENT 5 — Encryption completeness (G7)
      Implement and verify: C18, C19
      Re-read C18–C19 from disk before each sub-segment.

    SEGMENT 6 — Usability + OSS (G8 + G9) + output robustness (G11 output half)
      Implement and verify: C20, C21, C22, C23, C24, C28, C29, C31, C34
      Re-read C20–C24, C28, C29, C31, C34 from disk before each sub-segment.

    SEGMENT 7 — AI-era threat resistance (G10)
      Implement and verify: C26, C27
      Re-read C26–C27 from disk before each sub-segment.
      Note: C27's default-clipboard behavior depends on C13 (clipboard) being in place;
      sequence C27 after Segment 3. C26 depends only on OsRng (Segment 1 primitives).

    IVD Rule 2 — POST-IMPLEMENTATION AUDIT: Re-read this entire file from disk
    (not from memory). For each of the 34 constraints, diff the implementation
    against the constraint and report: PASS / FAIL / NEEDS_REVIEW.
    Do not declare the implementation complete until every constraint is PASS
    or NEEDS_REVIEW with written justification. Undeclared FAILs are not acceptable.

  implementation_roadmap:
    # Suggested milestone order for a first contribution or fork.
    - "1. File format types & serialisation (C7, C8, C9, C10) + parser hardening & fuzz harnesses (C30)"
    - "2. Cryptographic core — KDF incl. floor/ceiling/NFC, AEAD, HKDF, envelope (C1–C6)"
    - "3. Memory hardening layer — zeroize, mlock, constant-time, core dumps (C11–C13, C25) + clipboard concealment (C33)"
    - "4. Vault read/write — open, save, upgrade-kdf (C2, C4, C5, C16) + atomic saves & locking (C32)"
    - "5. CLI surface — init, add, get, ls, edit, rm, export, import, tune, gen (C20–C22, C26) + output sanitization, export escaping, no-argv-secrets (C28, C29, C31)"
    - "6. Hardware factors — FIDO2, YubiKey CR, TPM (C14, C15; optional)"
    - "7. OS keystore stanzas — macOS Secure Enclave, Windows DPAPI/CNG (C5; optional)"
    - "8. Import from common formats — pass/gopass, KeePassXC CSV, JSON (C21 import)"
    - "9. AI-era hardening — CSPRNG password generator + model-blind secret delivery (C26, C27)"
    - "10. Distribution trust — reproducible builds, signed releases, provenance (C34)"
    - "11. IVD Rule 2 post-implementation audit — PASS / FAIL / NEEDS_REVIEW per constraint"
